<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ADICIONE ESTA LINHA NO HEAD -->

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f6f7;
    margin: 0;
    padding: 10px; /* Espaço nas bordas no mobile */
}

.container {
    width: 95%; /* Quase toda a tela no mobile */
    max-width: 800px; /* Não deixa ficar gigante no PC */
    margin: 10px auto;
    background: #fff;
    padding: 20px;
    border-radius: 6px;
    border: 1px solid #e0e0e0;
    box-sizing: border-box; /* Garante que o padding não quebre a largura */
}

.header {
    display: flex;
    flex-direction: column; /* No mobile, um embaixo do outro */
    align-items: center;
    text-align: center;
    gap: 15px;
}

.header img {
    width: 150px;
    order: -1; /* Coloca a logo acima do título no mobile */
}

.info-top {
    display: flex;
    flex-direction: column; /* Empilha as informações no mobile */
    margin-top: 20px;
    gap: 10px;
}

.info-top p {
    margin: 5px 0;
}

.status {
    display: flex;
    flex-direction: column; /* Ícones um embaixo do outro no mobile */
    gap: 25px;
    margin-top: 25px;
}

/* --- Ajustes para telas maiores (Computador) --- */
@media (min-width: 768px) {
    .container {
        width: 85%;
        margin: 30px auto;
        padding: 30px;
    }
    .header {
        flex-direction: row;
        justify-content: space-between;
    }
    .header img {
        order: 1; /* Logo na direita no PC */
    }
    .info-top {
        flex-direction: row;
        justify-content: space-between;
    }
    .status {
        flex-direction: row;
        justify-content: space-around;
    }
}

.progress {
    margin: 25px 0;
    height: 16px;
    background: #e0e0e0;
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    width: 100%;
    height: 100%;
    background: #4CAF50;
}

.status i {
    font-size: 26px;
    margin-bottom: 8px;
    color: #444;
}

.section {
    margin-top: 35px;
}

h2 { font-weight: normal; color: #333; margin: 0; }
h3 { color: #333; }
ul { padding-left: 18px; color: #444; }
</style>
